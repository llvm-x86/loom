name: "bun install (shared cache)"
description: >
   Ensure bun is on PATH, then run `bun install --frozen-lockfile` with a shared
   dependency cache. bun setup is skipped when the runner image already ships it
   (the preloaded omp-kata image), and only fetched on runners that lack it
   (e.g. GitHub-hosted). The cache uses the in-cluster RustFS S3 when the sccache
   credentials are present, and the stock actions/cache backend otherwise.

runs:
   using: composite
   steps:
      - name: Detect environment
        id: env
        shell: bash
        run: |
           # bun is baked into the omp-kata runner image — only fetch it when the
           # runner doesn't already provide it (GitHub-hosted), so we don't
           # re-download bun from GitHub releases on every job.
           if command -v bun >/dev/null 2>&1; then
             echo "setup_bun=false" >> "$GITHUB_OUTPUT"
             echo "bun present: $(bun --version) (preloaded image)"
           else
             echo "setup_bun=true" >> "$GITHUB_OUTPUT"
           fi
           # The repo keys "are we on can.internal infra?" off $SCCACHE_BUCKET (see
           # actions/build-native). RUNNER_ENVIRONMENT is empty on ARC pods, so it
           # is not a usable signal here.
           if [ -n "${SCCACHE_BUCKET:-}" ] && [ -n "${AWS_ACCESS_KEY_ID:-}" ]; then
             echo "cache=rustfs" >> "$GITHUB_OUTPUT"
             echo "bun cache backend: RustFS S3 ($SCCACHE_BUCKET @ $SCCACHE_ENDPOINT)"
           else
             echo "cache=gha" >> "$GITHUB_OUTPUT"
             echo "bun cache backend: GitHub Actions cache"
           fi
      - name: Install bun when absent
        if: steps.env.outputs.setup_bun == 'true'
        shell: bash
        run: |
           export BUN_INSTALL="${HOME}/.bun"
           curl -fsSL https://bun.sh/install | bash -s "bun-v1.3.14"
           echo "${BUN_INSTALL}/bin" >> "$GITHUB_PATH"

      # Off-infra (GitHub-hosted): stock actions/cache for the bun store.
      - name: Cache bun store (GitHub cache)
        if: steps.env.outputs.cache == 'gha'
        uses: actions/cache@v4
        with:
           path: ~/.bun/install/cache
           key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}

      # On-infra (omp-kata): RustFS store + node_modules over the LAN.
      - name: Restore bun caches (RustFS)
        if: steps.env.outputs.cache == 'rustfs'
        shell: bash
        run: |
           bash "$GITHUB_ACTION_PATH/rustfs-cache.sh" restore || {
             echo "::warning::RustFS bun cache restore failed; continuing without shared cache"
           }

      - name: Install dependencies
        shell: bash
        run: bun install --frozen-lockfile

      - name: Save bun caches (RustFS)
        if: steps.env.outputs.cache == 'rustfs'
        shell: bash
        run: |
           bash "$GITHUB_ACTION_PATH/rustfs-cache.sh" save || {
             echo "::warning::RustFS bun cache save failed; continuing without shared cache"
           }
