name: Build native addon (omp-kata)
description: >
   Build the pi_natives cdylib on the preloaded omp-kata runner image, using
   baked toolchains and the shared RustFS-backed sccache instead of per-job tool
   setup downloads.

inputs:
   hash:
      description: Rust source hash used in the artifact name
      required: true
   platform:
      description: Target platform (linux, darwin, win32)
      required: true
   arch:
      description: Target arch (x64, arm64)
      required: true
   variant:
      description: Optional build variant (baseline, modern); required for native x64 builds.
      required: false
      default: ""
   target:
      description: Optional rustc target triple for cross-compilation
      required: false
      default: ""
   rust_checks:
      description: Run clippy/rustfmt checks (only one matrix entry should set this)
      required: false
      default: "false"
   save_cache:
      description: Kept for interface parity with the GitHub-hosted action; unused here.
      required: false
      default: "false"

runs:
   using: composite
   steps:
      - uses: ./.github/actions/ensure-rust-toolchain
        with:
           toolchain: nightly-2026-04-29
           components: ${{ inputs.rust_checks == 'true' && 'clippy,rustfmt' || '' }}
           target: ${{ inputs.target }}
      - name: Configure native Rust flags
        if: inputs.target == ''
        shell: bash
        env:
           TARGET_ARCH: ${{ inputs.arch }}
           TARGET_VARIANT: ${{ inputs.variant }}
        run: |
           case "$TARGET_ARCH:$TARGET_VARIANT" in
             x64:modern)
               rustflags="-C target-cpu=x86-64-v3"
               ;;
             x64:baseline)
               rustflags="-C target-cpu=x86-64-v2"
               ;;
             x64:*)
               echo "::error::x64 native builds require variant=modern or variant=baseline"
               exit 1
               ;;
             *)
               if [ -n "${RUSTFLAGS:-}" ]; then
                 echo "Using caller-provided RUSTFLAGS=$RUSTFLAGS"
                 exit 0
               fi
               rustflags="-C target-cpu=native"
               ;;
           esac

           echo "RUSTFLAGS=$rustflags" >> "$GITHUB_ENV"
           echo "Configured RUSTFLAGS=$rustflags"
      - uses: ./.github/actions/ensure-sccache
        with:
           version: "0.15.0"
      - name: Enable sccache for cargo
        shell: bash
        run: |
           {
             echo "RUSTC_WRAPPER=sccache"
             echo "CARGO_INCREMENTAL=0"
           } >> "$GITHUB_ENV"
           echo "sccache backend: shared S3 ($SCCACHE_BUCKET @ $SCCACHE_ENDPOINT)"
      - uses: ./.github/actions/ensure-cargo-tool
        if: inputs.target == ''
        with:
           binary: cargo-nextest
           crate: cargo-nextest
      - uses: ./.github/actions/bun-install
      - uses: ./.github/actions/ensure-zig
        if: inputs.target != '' && !endsWith(inputs.target, '-msvc')
        with:
           version: "0.16.0"
      - uses: ./.github/actions/ensure-cargo-tool
        if: inputs.target != '' && !endsWith(inputs.target, '-msvc')
        with:
           binary: cargo-zigbuild
           crate: cargo-zigbuild
      - uses: ./.github/actions/ensure-cargo-tool
        if: endsWith(inputs.target, '-msvc')
        with:
           binary: cargo-xwin
           crate: cargo-xwin
      - name: Cache cargo-xwin Windows SDK
        if: endsWith(inputs.target, '-msvc')
        uses: actions/cache@v4
        with:
           path: ~/.cache/cargo-xwin
           key: cargo-xwin-${{ runner.os }}-v1
      - name: Accept xwin license
        if: endsWith(inputs.target, '-msvc')
        shell: bash
        run: echo "XWIN_ACCEPT_LICENSE=1" >> "$GITHUB_ENV"
      - name: Rust checks
        if: inputs.rust_checks == 'true'
        shell: bash
        run: bun run check:rs
      - name: Test workspace (Rust)
        if: inputs.target == '' && inputs.platform != 'darwin'
        shell: bash
        run: bun run test:rs
      - name: Build native addon(s)
        shell: bash
        env:
           CROSS_TARGET: ${{ inputs.target }}
           TARGET_PLATFORM: ${{ inputs.platform }}
           TARGET_ARCH: ${{ inputs.arch }}
           TARGET_VARIANTS: ${{ inputs.variant }}
        run: bun run ci:build:native
      - name: Upload native addon(s)
        uses: actions/upload-artifact@v4
        with:
           name: pi-natives-${{ inputs.platform }}-${{ inputs.arch }}${{ inputs.variant && format('-{0}', inputs.variant) || '' }}-h${{ inputs.hash }}
           path: packages/natives/native/pi_natives.${{ inputs.platform }}-${{ inputs.arch }}*.node
           if-no-files-found: error
           retention-days: 90
